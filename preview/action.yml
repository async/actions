name: async package preview
description: Publish same-repo PR/main preview packages to GitHub Packages and emit install comment bodies.
inputs:
  package-path:
    description: Package directory containing package.json.
    default: "."
  target-registry:
    description: GitHub Packages registry URL.
    default: https://npm.pkg.github.com
  namespace:
    description: Preview package namespace.
    default: ""
  mode:
    description: Preview mode, pr or main.
    default: pr
  comment:
    description: Whether PR previews maintain an install comment.
    default: "true"
  token-env-name:
    description: Name of the env var containing the token supplied by the caller.
    default: GITHUB_TOKEN
  release-package:
    description: Package source for the released @async/release CLI.
    default: github:async/release#v0.1.3
  move-dist-tag:
    description: Whether this run is allowed to move the mutable preview dist-tag.
    default: "true"
  working-directory:
    description: Directory containing package-path.
    default: "."
outputs:
  package-spec:
    description: Published preview package spec.
    value: ${{ steps.preview.outputs.package-spec }}
  published-version:
    description: Published preview version.
    value: ${{ steps.preview.outputs.published-version }}
  dist-tag:
    description: Preview dist-tag.
    value: ${{ steps.preview.outputs.dist-tag }}
  comment-body:
    description: Markdown body for a generated comment action.
    value: ${{ steps.preview.outputs.comment-body }}
  comment-marker:
    description: Stable marker for the generated preview comment.
    value: ${{ steps.preview.outputs.comment-marker }}
runs:
  using: composite
  steps:
    - name: Publish package preview
      id: preview
      shell: bash
      run: node "${{ github.action_path }}/../scripts/preview.mjs"
      env:
        INPUT_PACKAGE_PATH: ${{ inputs.package-path }}
        INPUT_TARGET_REGISTRY: ${{ inputs.target-registry }}
        INPUT_NAMESPACE: ${{ inputs.namespace }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_TOKEN_ENV_NAME: ${{ inputs.token-env-name }}
        INPUT_RELEASE_PACKAGE: ${{ inputs.release-package }}
        INPUT_MOVE_DIST_TAG: ${{ inputs.move-dist-tag }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
